name: preschool_hub
description: A multi-tenant preschool and daycare school management platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.9
  firebase_messaging: ^14.7.19
  flutter_local_notifications: ^17.0.0

  # Routing
  go_router: ^13.2.0

  # State Management
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.3

  # UI & Utilities
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  intl: ^0.19.0
  fl_chart: ^0.66.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
